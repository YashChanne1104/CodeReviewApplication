{% extends "base.html" %}
{% block title %}Verify Code — ReviewAgent{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="card">
        <div class="card-header">
            <span class="card-icon">◆</span>
            <h2>Enter your code</h2>
            <p class="card-subtitle">We emailed you a 6-digit code</p>
        </div>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/verify-otp">
            <input type="hidden" name="user_id" value="{{ user_id }}">
            <div class="form-group">
                <label>Code</label>
                <input type="text" name="code" maxlength="6" placeholder="123456" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-large">Verify</button>
        </form>
    </div>
</section>
{% endblock %}
