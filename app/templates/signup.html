{% extends "base.html" %}

{% block title %}Sign Up — ReviewAgent{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="card">
        <div class="card-header">
            <span class="card-icon">◆</span>
            <h2>Create your account</h2>
            <p class="card-subtitle">Start reviewing code in under a minute</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/signup">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="yash_channe" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large">Create Account</button>
        </form>

        <p class="card-footer">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
</section>
{% endblock %}
