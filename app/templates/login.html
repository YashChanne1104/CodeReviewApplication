{% extends "base.html" %}

{% block title %}Login — ReviewAgent{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="card">
        <div class="card-header">
            <span class="card-icon">◆</span>
            <h2>Welcome back</h2>
            <p class="card-subtitle">Log in to view your review history</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="yash_channe" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large">Login</button>
        </form>

        <p class="card-footer">
            Don't have an account? <a href="/signup">Sign up</a>
        </p>
    </div>
</section>
{% endblock %}
