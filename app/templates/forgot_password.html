{% extends "base.html" %}
{% block title %}Forgot Password — ReviewAgent{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="card">
        <div class="card-header">
            <span class="card-icon">◆</span>
            <h2>Reset your password</h2>
            <p class="card-subtitle">Enter your email to receive a code</p>
        </div>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/forgot-password">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-large">Send Code</button>
        </form>
        <p class="card-footer"><a href="/login">Back to login</a></p>
    </div>
</section>
{% endblock %}
